{% extends 'base.html' %}

{% block content %}
<h1>{{ message.subject }}</h1>
<p>{{ message.body|linebreaks }}</p>
<a href="{% url 'email_messages:update' message.pk %}" class="btn btn-outline-success">Редактировать</a>
<a href="{% url 'email_messages:delete' message.pk %}" class="btn btn-outline-danger">Удалить</a>
<a href="{% url 'email_messages:list' %}" class="btn btn-secondary">Назад к списку</a>
{% endblock %}
