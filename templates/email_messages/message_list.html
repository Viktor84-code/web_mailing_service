{% extends 'base.html' %}

{% block content %}
<h1>Сообщения</h1>
<a href="{% url 'email_messages:create' %}" class="btn btn-success mb-3">Добавить сообщение</a>
<ul class="list-group">
    {% for message in messages %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
        {{ message.subject }}
        <div>
            <a href="{% url 'email_messages:detail' message.pk %}" class="btn btn-sm btn-outline-info">Просмотр</a>
            <a href="{% url 'email_messages:update' message.pk %}" class="btn btn-sm btn-outline-success">Ред</a>
            <a href="{% url 'email_messages:delete' message.pk %}" class="btn btn-sm btn-outline-danger">Уд</a>
        </div>
    </li>
    {% empty %}
    <li class="list-group-item">Нет сообщений. <a href="{% url 'email_messages:create' %}">Создайте первое сообщение</a>.
    </li>
    {% endfor %}
</ul>
{% endblock %}
