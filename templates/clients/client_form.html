{% extends 'base.html' %}

{% block content %}
<h1>{% if object %}Редактировать{% else %}Добавить{% endif %} клиента</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="{% url 'clients:list' %}" class="btn btn-secondary">Назад к списку</a>
</form>
{% endblock %}
