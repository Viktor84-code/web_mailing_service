{% extends 'base.html' %}

{% block content %}
<h1>Удалить клиента {{ object.full_name }}?</h1>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'clients:list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
