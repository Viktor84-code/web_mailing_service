{% extends 'base.html' %}

{% block content %}
<h1>Удалить рассылку #{{ object.id }}?</h1>
<form method="post">

    <button type="submit" class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'mailings:list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
